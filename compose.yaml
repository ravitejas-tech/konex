services:
  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_PATH: "/data/konex.db"
    volumes:
      - api-data:/data
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VITE_API_URL: "http://localhost:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
